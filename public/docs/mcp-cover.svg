<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#12101f"/>
    </linearGradient>
    <linearGradient id="glow" x1="200" y1="0" x2="600" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b7cf6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#5ec8ff" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8b7cf6"/>
      <stop offset="1" stop-color="#5ec8ff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="620" cy="80" rx="220" ry="160" fill="url(#glow)"/>
  <ellipse cx="120" cy="420" rx="180" ry="120" fill="url(#glow)" opacity="0.6"/>
  <rect x="56" y="56" width="688" height="388" rx="20" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <rect x="88" y="96" width="120" height="28" rx="14" fill="rgba(94,200,255,0.12)" stroke="rgba(94,200,255,0.25)"/>
  <text x="104" y="115" fill="#5ec8ff" font-family="ui-monospace, monospace" font-size="11" letter-spacing="2">MCP SERVER</text>
  <text x="88" y="178" fill="#ffffff" font-family="system-ui, sans-serif" font-size="34" font-weight="600">Connect Claude, Cursor</text>
  <text x="88" y="218" fill="#ffffff" font-family="system-ui, sans-serif" font-size="34" font-weight="600">&amp; your creative stack</text>
  <text x="88" y="262" fill="#9aa0ac" font-family="system-ui, sans-serif" font-size="16">Generate images, video, brand packs from any MCP client.</text>
  <rect x="88" y="300" width="200" height="44" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)"/>
  <text x="108" y="327" fill="#cdbfff" font-family="ui-monospace, monospace" font-size="13">generate_image</text>
  <rect x="304" y="300" width="180" height="44" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)"/>
  <text x="324" y="327" fill="#cdbfff" font-family="ui-monospace, monospace" font-size="13">brand_pack_resize</text>
  <rect x="500" y="300" width="170" height="44" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)"/>
  <text x="520" y="327" fill="#cdbfff" font-family="ui-monospace, monospace" font-size="13">generate_video</text>
  <circle cx="700" cy="380" r="56" stroke="url(#accent)" stroke-width="3" fill="rgba(139,124,246,0.08)"/>
  <text x="700" y="388" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="700">MCP</text>
